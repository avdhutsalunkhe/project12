<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Recommender</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>SHL Recommender</h1>
                <div id="api-status" class="status-indicator">
                    <span class="status-dot checking"></span>
                    <span class="status-text">Checking Server...</span>
                </div>
            </div>
        </header>
        
        <main id="chat-container">
            <div class="chat-wrapper" id="chat-wrapper">
                <div class="message assistant">
                    <div class="bubble">
                        Hello! I am the SHL Assessment Recommender. What kind of role are you hiring for, and what skills do you need to assess?
                    </div>
                </div>
            </div>
            
            <div id="typing-indicator" class="typing-indicator hidden">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span id="wakeup-msg" class="wakeup-msg hidden">Server waking up...</span>
            </div>
        </main>
        
        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
